name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # pytest-homeassistant-custom-component pins a matching Home Assistant,
          # which needs a recent Python regardless of what the integration itself
          # supports.
          python-version: "3.13"
      # Deliberately not an editable install: it registers an import hook that
      # Home Assistant's loader cannot resolve, and pytest's pythonpath setting
      # already puts custom_components on the path.
      - run: pip install pytest-homeassistant-custom-component
      - run: pytest -q

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
